server:
  port: 8080
  mode: "release"  # debug/release

database:
  path: "./data/claw.db"
  max_open_conns: 10
  max_idle_conns: 5

jwt:
  secret: "your-secret-key-change-in-production"
  expire_hours: 24

websocket:
  heartbeat_interval: 30
  write_timeout: 10

log:
  level: "info"  # debug/info/warn/error
  format: "json" # json/text
